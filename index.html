<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Library Book Management System</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <header class="header">
        <div class="container">
            <h1><i class="fas fa-book-reader"></i> Library Management</h1>
            <p> Manager dashboard</p>
        </div>
    </header>

    <main class="container dashboard">
        <div id="toast-container"></div>
        <div class="grid">
            <!-- Form Panel -->
            <section class="card">
                <h2><i class="fas fa-book-medical"></i> Book Registration</h2>
                <form id="book-form">
                    <div class="form-group">
                        <label>Book ID</label>
                        <input type="text" id="book-id" placeholder="Enter unique Book ID">
                        <span class="error" id="err-id"></span>
                    </div>
                    <div class="form-group">
                        <label>Title</label>
                        <input type="text" id="book-title" placeholder="Enter title">
                        <span class="error" id="err-title"></span>
                    </div>
                    <div class="form-group">
                        <label>Author</label>
                        <input type="text" id="book-author" placeholder="Enter author">
                        <span class="error" id="err-author"></span>
                    </div>
                    <div class="form-group">
                        <label>Category</label>
                        <select id="book-category">
                            <option value="">Select Category</option>
                            <option value="Programming">Programming</option>
                            <option value="Computer Science">Computer Science</option>
                            <option value="Mathematics">Mathematics</option>
                            <option value="Literature">Literature</option>
                            <option value="Novel">Novel</option>
                            <option value="Fiction">Fiction</option>
                            <option value="Non-Fiction">Non-Fiction</option>
                            <option value="Science">Science</option>
                            <option value="History">History</option>
                            <option value="Business">Business</option>
                            <option value="Economics">Economics</option>
                            <option value="Religion">Religion</option>
                            <option value="Biography">Biography</option>
                            <option value="Health">Health</option>
                            <option value="Education">Education</option>
                        </select>
                        <span class="error" id="err-category"></span>
                    </div>
                    <div class="actions">
                        <button type="submit" id="btn-submit" class="btn blue"><i class="fas fa-plus"></i> Add
                            Book</button>
                        <button type="button" id="btn-clear" class="btn gray"><i class="fas fa-eraser"></i>
                            Clear</button>
                    </div>
                </form>
            </section>

            <!-- Table Panel -->
            <section class="card data-card">
                <div class="table-header">
                    <h2><i class="fas fa-stream"></i> Collection</h2>
                    <input type="text" id="search" placeholder="Search books by title...">
                </div>
                <div class="table-wrap">
                    <table id="books-table">
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>Title</th>
                                <th>Author</th>
                                <th>Category</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody id="table-body"></tbody>
                    </table>
                    <div id="empty-state" class="empty">
                        <div class="empty-icon-wrap">
                            <i class="fas fa-book-open"></i>
                        </div>
                        <p>No books available in the collection.</p>
                    </div>
                </div>
            </section>
        </div>

        <!-- Modal -->
        <div id="modal" class="modal-bg hidden">
            <div class="modal">
                <div class="modal-icon-wrap"><i class="fas fa-exclamation-triangle"></i></div>
                <h3>Confirm Deletion</h3>
                <p>Are you sure you want to delete this book from your library?</p>
                <div class="modal-actions">
                    <button id="btn-cancel" class="btn gray"><i class="fas fa-times"></i> Cancel</button>
                    <button id="btn-confirm" class="btn red"><i class="fas fa-trash"></i> Delete</button>
                </div>
            </div>
        </div>
    </main>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="script.js"></script>
</body>

</html>
